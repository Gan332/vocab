name: Build VocabApp Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('VocabApp/**/*.gradle*', 'VocabApp/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x VocabApp/gradlew

      - name: Show workspace structure
        run: |
          echo "## Workspace structure" >> $GITHUB_STEP_SUMMARY
          pwd
          ls -la VocabApp/
          echo "---" >> $GITHUB_STEP_SUMMARY
          ls -la VocabApp/gradle/wrapper/
          echo "---" >> $GITHUB_STEP_SUMMARY
          file VocabApp/gradlew
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_STEP_SUMMARY
          ls -la $ANDROID_HOME/platforms/ 2>&1 || echo "no platforms dir"
          ls -la $ANDROID_HOME/build-tools/ 2>&1 || echo "no build-tools dir"
          java -version 2>&1
          cd VocabApp && ./gradlew --version 2>&1 || echo "Gradle wrapper failed"

      - name: Build debug APK
        run: |
          cd VocabApp
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../build-output.log

      - name: Upload build log (always)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocabApp-debug
          path: VocabApp/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        if: success()
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          APK_COUNT=$(find VocabApp/app/build/outputs/apk -name "*.apk" 2>/dev/null | wc -l)
          echo "| APK files | ${APK_COUNT} |" >> $GITHUB_STEP_SUMMARY