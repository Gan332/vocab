name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create temp-app com.vocab.app "背单词"
          cd temp-app
          cordova platform add android

      - name: Copy app files
        run: |
          cp index.html temp-app/www/index.html
          cp style.css temp-app/www/style.css
          cp app.js temp-app/www/app.js
          cp config.xml temp-app/

      - name: Build debug APK
        run: |
          cd temp-app
          cordova build android

      - name: Rename APK
        run: cp temp-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk vocab-app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vocab-app-apk
          path: vocab-app.apk
          retention-days: 30
