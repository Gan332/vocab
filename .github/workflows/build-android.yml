name: Build VocabApp Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x VocabApp/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('VocabApp/**/*.gradle*', 'VocabApp/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verify environment
        run: |
          echo "=== Environment ==="
          echo "JAVA_HOME: $JAVA_HOME"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          java -version 2>&1
          echo "=== SDK contents ==="
          ls -la $ANDROID_HOME/ 2>&1 || echo "ANDROID_HOME not set"
          ls -la $ANDROID_HOME/platforms/ 2>&1 || echo "No platforms dir"
          ls -la $ANDROID_HOME/build-tools/ 2>&1 || echo "No build-tools dir"

      - name: Build debug APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          cd VocabApp
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../build-output.log
          # 使用 PIPESTATUS 捕获 gradlew 的真实退出码
          exit ${PIPESTATUS[0]}

      - name: Show build log (always)
        if: always()
        run: |
          echo "## Build log (last 50 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 ../build-output.log 2>/dev/null || tail -50 build-output.log 2>/dev/null || echo "build-output.log not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Find APKs in output
        if: always()
        run: |
          echo "## Build output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "=== Searching for APK files ===" >> $GITHUB_STEP_SUMMARY
          find . -name "*.apk" -type f 2>/dev/null >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "=== VocabApp build directory (if exists) ===" >> $GITHUB_STEP_SUMMARY
          if [ -d VocabApp/app/build/outputs ]; then
            find VocabApp/app/build -type f -name "*.apk" -o -name "*.aab" 2>/dev/null | head -50 >> $GITHUB_STEP_SUMMARY
            ls -laR VocabApp/app/build/outputs/ 2>&1 | head -100 >> $GITHUB_STEP_SUMMARY
          else
            echo "VocabApp/app/build/outputs/ not found" >> $GITHUB_STEP_SUMMARY
            echo "Checking alternative paths..." >> $GITHUB_STEP_SUMMARY
            find . -type d -name "outputs" 2>/dev/null | head -10 >> $GITHUB_STEP_SUMMARY
            ls -la VocabApp/app/build/ 2>&1 | head -20 >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build-output.log
            VocabApp/app/build/outputs/
          if-no-files-found: warn
          retention-days: 30