# =============================================================================
# Build VocabApp APK
# - 自动构建: push/PR 到 main 分支时构建 debug APK
# - 手动构建: workflow_dispatch 选择 debug/release
# =============================================================================

name: Build VocabApp APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  SDK_API_LEVEL: '34'
  SDK_BUILD_TOOLS: '34.0.0'

jobs:
  build:
    name: Build ${{ inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest

    steps:
      # ===== 检出代码 =====
      - name: Checkout
        uses: actions/checkout@v4

      # ===== 环境准备 =====
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install required SDK components
        run: |
          SDKMANAGER=""
          for p in "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
                    "$ANDROID_HOME/tools/bin/sdkmanager"; do
            if [ -x "$p" ]; then SDKMANAGER="$p"; break; fi
          done
          if [ -z "$SDKMANAGER" ]; then
            echo "::warning::sdkmanager not found, relying on pre-installed SDK"
          else
            echo "Using: $SDKMANAGER"
            yes | "$SDKMANAGER" --install \
              "platforms;android-${{ env.SDK_API_LEVEL }}" \
              "build-tools;${{ env.SDK_BUILD_TOOLS }}" \
              2>&1 | tail -5
          fi

      # ===== 权限 =====
      - name: Grant execute permission for gradlew
        run: chmod +x VocabApp/gradlew

      # ===== 缓存 Gradle 依赖 =====
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('VocabApp/**/*.gradle*', 'VocabApp/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ===== 打印诊断信息（辅助排查 CI 环境问题） =====
      - name: Environment diagnostics
        run: |
          echo "=== Environment Diagnostics ==="
          echo "ANDROID_HOME: ${ANDROID_HOME:-<unset>}"
          echo "ANDROID_SDK_ROOT: ${ANDROID_SDK_ROOT:-<unset>}"
          echo "JAVA_HOME: ${JAVA_HOME:-<unset>}"
          java -version 2>&1 || true
          echo "--- Working directory: $(pwd) ---"
          ls -la VocabApp/gradlew
          head -3 VocabApp/gradle/wrapper/gradle-wrapper.properties
          echo "=== End Diagnostics ==="

      # ===== 判断构建类型 =====
      - name: Set build type
        id: build-type
        run: |
          BUILD_TYPE="${{ inputs.build_type || 'debug' }}"
          echo "build_type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"
          echo "Build type: $BUILD_TYPE"

      # ===== 准备 Release 签名（仅 release + 有 secrets 时） =====
      - name: Prepare release signing
        if: ${{ inputs.build_type == 'release' && secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "Configuring release signing..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > VocabApp/app/keystore.jks
          cat > VocabApp/app/keystore.properties <<-EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # ===== 构建 APK =====
      - name: Build APK
        id: build
        working-directory: ./VocabApp
        env:
          # 显式设置 SDK 路径（setup-android@v4 的 GITHUB_ENV 可能被 step env 覆盖）
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -euo pipefail

          TASK="${{ steps.build-type.outputs.build_type == 'release' && 'assembleRelease' || 'assembleDebug' }}"
          echo "Running: ./gradlew $TASK --no-daemon --stacktrace"
          ./gradlew "$TASK" --no-daemon --stacktrace 2>&1 | tee build-output.log

      # ===== 上传构建产物 =====
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VocabApp-${{ steps.build-type.outputs.build_type }}
          path: VocabApp/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      # ===== 上传构建日志（失败时辅助排查） =====
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ steps.build-type.outputs.build_type }}
          path: VocabApp/build-output.log
          if-no-files-found: warn
          retention-days: 7
