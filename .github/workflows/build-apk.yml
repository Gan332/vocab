name: Build VocabApp APK (manual only)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          SDKMANAGER=""
          for p in "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_HOME/tools/bin/sdkmanager"; do
            if [ -x "$p" ]; then SDKMANAGER="$p"; break; fi
          done
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found, skipping"
          else
            echo "Using: $SDKMANAGER"
            yes | "$SDKMANAGER" --install "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -10
          fi

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('VocabApp/**/*.gradle*', 'VocabApp/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x VocabApp/gradlew

      - name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cd VocabApp
          if [ "$BUILD_TYPE" = "release" ] && [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
            cat >> app/keystore.properties <<-EOF
            storeFile=keystore.jks
            storePassword=$STORE_PASSWORD
            keyAlias=$KEY_ALIAS
            keyPassword=$KEY_PASSWORD
            EOF
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocabApp-${{ github.event.inputs.build_type || 'debug' }}
          path: VocabApp/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
